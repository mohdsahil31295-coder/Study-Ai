<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Ai - Made by Suhel & Saurabh Sir</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            bg: '#131314',
                            sidebar: '#1e1f20',
                            userMessage: '#1e1f20',
                            border: '#333537',
                            hover: '#333537',
                            text: '#e3e3e3',
                            muted: '#c4c7c5'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- Markdown Parser & Sanitizer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b4b4b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b6b6b;
        }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(74deg, #4285f4 0, #9b72cb 9%, #d96570 20%, #d96570 24%, #9b72cb 35%, #4285f4 44%, #9b72cb 50%, #d96570 56%, #131314 75%, #131314 100%);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Markdown Styles */
        .markdown-body {
            color: #e3e3e3;
            line-height: 1.6;
        }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #fff;
        }
        .markdown-body h1 { font-size: 1.5rem; }
        .markdown-body h2 { font-size: 1.25rem; }
        .markdown-body h3 { font-size: 1.1rem; }
        .markdown-body code {
            background-color: #2a2a2b;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background-color: #1e1f20;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1rem;
            border: 1px solid #333537;
        }
        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            color: #a8c7fa;
        }
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body a { color: #a8c7fa; text-decoration: underline; }
        
        /* Loading Animation */
        .loader-dots {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 24px;
        }
        .loader-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #a8c7fa;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loader-dots span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        textarea {
            resize: none;
            overflow-y: hidden;
        }

        .card-hover {
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .card-hover:hover {
            background-color: #333537;
        }
    </style>
</head>
<body class="bg-gemini-bg text-gemini-text font-sans h-screen flex overflow-hidden selection:bg-[#4285f4] selection:text-white">

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-gemini-sidebar w-[280px] h-full flex flex-col flex-shrink-0 transition-all duration-300 transform -translate-x-full md:translate-x-0 fixed md:relative z-20">
        <div class="p-4 flex items-center">
            <button id="closeSidebarBtn" class="p-2 md:hidden hover:bg-gemini-hover rounded-full text-gemini-muted transition-colors mr-2">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <button onclick="startNewChat()" class="flex items-center gap-2 bg-gemini-bg hover:bg-gemini-hover text-gemini-text rounded-full py-2.5 px-4 transition-colors w-max border border-gemini-border">
                <span class="material-symbols-outlined text-[20px]">add</span>
                <span class="text-sm font-medium">New Chat</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto px-3 py-2">
            <div class="text-xs font-medium text-gemini-muted px-3 mb-2 uppercase tracking-wider">Recent</div>
            <div id="chatHistoryList" class="space-y-1">
                <!-- Chat history items will be injected here -->
            </div>
        </div>

        <div class="p-4 border-t border-gemini-border mt-auto">
            <div class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gemini-hover transition-colors cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 flex items-center justify-center text-white font-bold text-sm">
                    S
                </div>
                <div class="flex-col">
                    <span class="text-sm font-medium block">Student Portal</span>
                    <span class="text-xs text-gemini-muted block">Grades 1st to 12th</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Overlay for Mobile -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-10 hidden md:hidden transition-opacity"></div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative min-w-0">
        <!-- Header -->
        <header class="h-16 flex items-center justify-between px-4 sticky top-0 bg-gemini-bg z-10">
            <div class="flex items-center gap-3">
                <button id="openSidebarBtn" class="p-2 hover:bg-gemini-hover rounded-full text-gemini-muted transition-colors md:hidden">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="text-xl font-medium flex items-center gap-2">
                    <span class="material-symbols-outlined text-[#a8c7fa]">school</span>
                    Study Ai
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button class="p-2 hover:bg-gemini-hover rounded-full text-gemini-muted transition-colors" title="Settings">
                    <span class="material-symbols-outlined">settings</span>
                </button>
                <div class="w-8 h-8 rounded-full bg-[#a8c7fa] flex items-center justify-center text-gemini-bg font-medium cursor-pointer">
                    U
                </div>
            </div>
        </header>

        <!-- Scrollable Chat Area -->
        <div id="chatContainer" class="flex-1 overflow-y-auto px-4 md:px-8 lg:px-24 pb-36 pt-4 flex flex-col gap-6">
            
            <!-- Welcome Screen -->
            <div id="welcomeScreen" class="flex flex-col flex-1 max-w-4xl mx-auto w-full pt-10 md:pt-20">
                <h1 class="text-4xl md:text-5xl font-semibold mb-2">
                    <span class="gradient-text">नमस्ते, विद्यार्थी।</span>
                </h1>
                <h2 class="text-3xl md:text-4xl font-medium text-gemini-border mb-12">आज मैं आपकी पढ़ाई में कैसे मदद कर सकता हूँ?</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-8">
                    <!-- Suggestion Cards -->
                    <button onclick="setInputAndSend('कक्षा 5 के लिए जल चक्र (Water Cycle) को सरल शब्दों में समझाएं।')" class="card-hover bg-gemini-sidebar border border-gemini-border p-4 rounded-xl flex flex-col justify-between h-32 text-left cursor-pointer relative group">
                        <span class="text-sm">जल चक्र को सरल शब्दों में समझाएं</span>
                        <div class="w-8 h-8 rounded-full bg-gemini-bg flex items-center justify-center absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="material-symbols-outlined text-[18px]">science</span>
                        </div>
                    </button>
                    <button onclick="setInputAndSend('बीजगणित (Algebra) का यह समीकरण हल करने में मेरी मदद करें: 2x + 5 = 15')" class="card-hover bg-gemini-sidebar border border-gemini-border p-4 rounded-xl flex flex-col justify-between h-32 text-left cursor-pointer relative group">
                        <span class="text-sm">बीजगणित का समीकरण हल करने में मदद</span>
                        <div class="w-8 h-8 rounded-full bg-gemini-bg flex items-center justify-center absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="material-symbols-outlined text-[18px]">calculate</span>
                        </div>
                    </button>
                    <button onclick="setInputAndSend('कंप्यूटर के इतिहास पर एक निबंध की रूपरेखा तैयार करें।')" class="card-hover bg-gemini-sidebar border border-gemini-border p-4 rounded-xl flex flex-col justify-between h-32 text-left cursor-pointer relative group">
                        <span class="text-sm">कंप्यूटर के इतिहास पर निबंध की रूपरेखा</span>
                        <div class="w-8 h-8 rounded-full bg-gemini-bg flex items-center justify-center absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="material-symbols-outlined text-[18px]">history_edu</span>
                        </div>
                    </button>
                    <button onclick="setInputAndSend('न्यूटन के गति के तीन नियम क्या हैं?')" class="card-hover bg-gemini-sidebar border border-gemini-border p-4 rounded-xl flex flex-col justify-between h-32 text-left cursor-pointer relative group">
                        <span class="text-sm">न्यूटन के गति के तीन नियम क्या हैं?</span>
                        <div class="w-8 h-8 rounded-full bg-gemini-bg flex items-center justify-center absolute bottom-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <span class="material-symbols-outlined text-[18px]">menu_book</span>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Chat Messages Container -->
            <div id="messagesContainer" class="flex flex-col gap-6 max-w-4xl mx-auto w-full hidden">
                <!-- Messages will be injected here via JS -->
            </div>

            <!-- Loading Indicator (Hidden by default) -->
            <div id="loadingIndicator" class="flex gap-4 max-w-4xl mx-auto w-full hidden">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#4285f4] to-[#d96570] flex items-center justify-center flex-shrink-0">
                    <span class="material-symbols-outlined text-white text-[18px]">school</span>
                </div>
                <div class="flex items-center">
                    <div class="loader-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
            
            <!-- Bottom Anchor for auto-scrolling -->
            <div id="chatAnchor"></div>
        </div>

        <!-- Input Area Fixed at Bottom -->
        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-gemini-bg via-gemini-bg to-transparent pt-6 pb-4 px-4 md:px-8">
            <div class="max-w-4xl mx-auto relative">
                <!-- Error Toast -->
                <div id="errorToast" class="absolute -top-12 left-1/2 transform -translate-x-1/2 bg-red-900/80 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 opacity-0 transition-opacity duration-300 pointer-events-none hidden">
                    <span class="material-symbols-outlined text-[18px]">error</span>
                    <span id="errorMessage">Connection error. Please try again.</span>
                </div>

                <div class="bg-gemini-sidebar border border-gemini-border rounded-3xl p-2 flex items-end gap-2 focus-within:bg-[#252628] focus-within:border-gray-500 transition-colors shadow-lg">
                    <button class="p-3 text-gemini-muted hover:text-white rounded-full hover:bg-gemini-hover transition-colors flex-shrink-0" title="Upload Image (Disabled)">
                        <span class="material-symbols-outlined">add_photo_alternate</span>
                    </button>
                    
                    <textarea 
                        id="promptInput"
                        rows="1"
                        placeholder="Study Ai से कुछ भी पूछें (कक्षा 1 से 12 तक)..."
                        class="w-full bg-transparent text-gemini-text placeholder-gemini-border outline-none py-3 max-h-[200px] overflow-y-auto resize-none font-sans"
                        oninput="this.style.height = ''; this.style.height = Math.min(this.scrollHeight, 200) + 'px'"
                        onkeydown="handleKeyDown(event)"
                    ></textarea>
                    
                    <button class="p-3 text-gemini-muted hover:text-white rounded-full hover:bg-gemini-hover transition-colors flex-shrink-0 md:hidden" title="Use Microphone">
                        <span class="material-symbols-outlined">mic</span>
                    </button>
                    
                    <button id="sendBtn" onclick="handleSend()" class="p-3 text-gemini-muted hover:text-[#a8c7fa] rounded-full hover:bg-gemini-hover transition-colors flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>
                <div class="text-center mt-3 flex items-center justify-center gap-1 text-xs text-gemini-muted">
                    <span class="material-symbols-outlined text-[14px]">info</span>
                    Study Ai से गलतियां हो सकती हैं। यह कक्षा 1 से 12 तक के लिए है। इसे <b>Suhel & Saurabh Sir</b> ने बनाया है।
                </div>
            </div>
        </div>
    </main>

    <script>
        // DOM Elements
        const promptInput = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const messagesContainer = document.getElementById('messagesContainer');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const chatAnchor = document.getElementById('chatAnchor');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const openSidebarBtn = document.getElementById('openSidebarBtn');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const chatHistoryList = document.getElementById('chatHistoryList');
        const errorToast = document.getElementById('errorToast');
        const errorMessage = document.getElementById('errorMessage');

        // State Management
        let chatHistory = JSON.parse(localStorage.getItem('studyAiHistory')) || [];
        let currentSessionId = null;
        let isWaitingForResponse = false;

        // Initialize App
        function init() {
            renderSidebarHistory();
            
            // Check internet connection
            window.addEventListener('online', () => hideError());
            window.addEventListener('offline', () => showError("You are offline. Study Ai requires an internet connection."));

            // Input handling
            promptInput.addEventListener('input', () => {
                if (promptInput.value.trim() !== '') {
                    sendBtn.classList.add('text-[#a8c7fa]', 'bg-gemini-hover');
                } else {
                    sendBtn.classList.remove('text-[#a8c7fa]', 'bg-gemini-hover');
                }
            });
        }

        // Sidebar Toggle Logic
        function toggleSidebar(show) {
            if (show) {
                sidebar.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
                setTimeout(() => sidebarOverlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('opacity-0');
                setTimeout(() => sidebarOverlay.classList.add('hidden'), 300);
            }
        }

        openSidebarBtn.addEventListener('click', () => toggleSidebar(true));
        closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));
        sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

        // Start a New Chat
        function startNewChat() {
            currentSessionId = null;
            welcomeScreen.classList.remove('hidden');
            messagesContainer.classList.add('hidden');
            messagesContainer.innerHTML = '';
            promptInput.value = '';
            promptInput.style.height = 'auto';
            promptInput.focus();
            if (window.innerWidth < 768) toggleSidebar(false);
        }

        // Set input from suggestion cards
        function setInputAndSend(text) {
            promptInput.value = text;
            handleSend();
        }

        // Handle Enter Key
        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        }

        // Auto Scroll to bottom
        function scrollToBottom() {
            chatAnchor.scrollIntoView({ behavior: 'smooth' });
        }

        // Error Handling UI
        function showError(msg) {
            errorMessage.textContent = msg;
            errorToast.classList.remove('hidden');
            setTimeout(() => errorToast.classList.remove('opacity-0'), 10);
            
            setTimeout(() => {
                hideError();
            }, 5000);
        }

        function hideError() {
            errorToast.classList.add('opacity-0');
            setTimeout(() => errorToast.classList.add('hidden'), 300);
        }

        // Render Markdown safely
        function renderMarkdown(text) {
            const rawHtml = marked.parse(text);
            return DOMPurify.sanitize(rawHtml);
        }

        // Create Message HTML
        function createMessageElement(text, isUser = false) {
            const div = document.createElement('div');
            div.className = "flex gap-4 w-full";
            
            if (isUser) {
                div.innerHTML = `
                    <div class="flex-1 flex justify-end">
                        <div class="bg-gemini-userMessage border border-gemini-border px-5 py-3 rounded-2xl rounded-br-sm max-w-[85%] break-words shadow-sm text-[15px]">
                            ${text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>")}
                        </div>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#4285f4] to-[#d96570] flex items-center justify-center flex-shrink-0 shadow-sm">
                        <span class="material-symbols-outlined text-white text-[18px]">school</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="markdown-body pt-1 text-[15px]">
                            ${renderMarkdown(text)}
                        </div>
                    </div>
                `;
            }
            
            return div;
        }

        // Store chat in LocalStorage
        function saveToHistory(userText, aiText) {
            if (!currentSessionId) {
                currentSessionId = Date.now().toString();
                const title = userText.length > 30 ? userText.substring(0, 30) + '...' : userText;
                chatHistory.unshift({
                    id: currentSessionId,
                    title: title,
                    messages: []
                });
            }
            
            const session = chatHistory.find(s => s.id === currentSessionId);
            if (session) {
                session.messages.push({ role: 'user', content: userText });
                session.messages.push({ role: 'ai', content: aiText });
                localStorage.setItem('studyAiHistory', JSON.stringify(chatHistory));
                renderSidebarHistory();
            }
        }

        // Load specific chat session
        function loadSession(id) {
            const session = chatHistory.find(s => s.id === id);
            if (!session) return;
            
            currentSessionId = id;
            welcomeScreen.classList.add('hidden');
            messagesContainer.classList.remove('hidden');
            messagesContainer.innerHTML = '';
            
            session.messages.forEach(msg => {
                const el = createMessageElement(msg.content, msg.role === 'user');
                messagesContainer.appendChild(el);
            });
            
            scrollToBottom();
            if (window.innerWidth < 768) toggleSidebar(false);
        }

        // Render Sidebar List
        function renderSidebarHistory() {
            chatHistoryList.innerHTML = '';
            if (chatHistory.length === 0) {
                chatHistoryList.innerHTML = '<div class="text-xs text-gemini-border px-3 py-2 italic">No recent chats</div>';
                return;
            }
            
            chatHistory.slice(0, 10).forEach(session => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left px-3 py-2.5 rounded-lg text-sm text-gemini-text hover:bg-gemini-hover transition-colors truncate flex items-center gap-2 group";
                btn.innerHTML = `
                    <span class="material-symbols-outlined text-[16px] text-gemini-muted group-hover:text-gemini-text transition-colors">chat_bubble</span>
                    ${session.title}
                `;
                btn.onclick = () => loadSession(session.id);
                chatHistoryList.appendChild(btn);
            });
        }

        // Core Send Logic
        async function handleSend() {
            if (isWaitingForResponse) return;
            
            const text = promptInput.value.trim();
            if (!text) return;

            // Update UI State
            isWaitingForResponse = true;
            promptInput.value = '';
            promptInput.style.height = 'auto';
            promptInput.disabled = true;
            sendBtn.classList.remove('text-[#a8c7fa]', 'bg-gemini-hover');
            
            // Hide Welcome, Show Chat
            welcomeScreen.classList.add('hidden');
            messagesContainer.classList.remove('hidden');

            // Add User Message
            messagesContainer.appendChild(createMessageElement(text, true));
            scrollToBottom();

            // Show Loading
            loadingIndicator.classList.remove('hidden');
            scrollToBottom();

            // Check network before API call
            if (!navigator.onLine) {
                finalizeResponse("Oops! It looks like you're disconnected from the internet. Please check your connection so Study Ai can help you.", text);
                showError("No internet connection.");
                return;
            }

            try {
                // System Context instructing the AI
                const systemPrompt = `You are Study Ai, an advanced educational AI assistant strictly tailored for students from 1st to 12th grade. You were created by Suhel & Saurabh Sir. Keep answers educational, clear, engaging, and appropriately leveled. Always format using markdown for readability. IMPORTANT: You must ONLY speak and respond in the Hindi language, regardless of the language the user uses. Respond to the student's query in Hindi: `;
                
                const fullPrompt = systemPrompt + text;
                
                // Using Pollinations Text API (Free, no auth required)
                // Note: It returns plain markdown text directly.
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(fullPrompt)}`, {
                    method: 'GET'
                });

                if (!response.ok) {
                    throw new Error(`API responded with status ${response.status}`);
                }

                const aiText = await response.text();
                finalizeResponse(aiText, text);

            } catch (error) {
                console.error("API Error:", error);
                const fallbackMessage = "I'm sorry, I'm having trouble connecting to my knowledge base right now. Please try again in a moment! \n\n*(Error: " + error.message + ")*";
                finalizeResponse(fallbackMessage, text);
                showError("Failed to fetch response. Try again.");
            }
        }

        // Process final response and cleanup UI
        function finalizeResponse(aiText, originalUserText) {
            loadingIndicator.classList.add('hidden');
            
            const aiMessageEl = createMessageElement(aiText, false);
            messagesContainer.appendChild(aiMessageEl);
            
            saveToHistory(originalUserText, aiText);
            
            isWaitingForResponse = false;
            promptInput.disabled = false;
            promptInput.focus();
            scrollToBottom();
        }

        // Run Initialization
        init();

    </script>
</body>
  </html>
