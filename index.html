<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Ai - Made by Suhel & Saurabh Sir</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #131314; color: #e3e3e3;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }
        /* Sidebar */
        #sidebar {
            width: 255px; min-width: 255px; background: #1e1f20;
            height: 100vh; display: flex; flex-direction: column;
            border-right: 1px solid #2a2b2d; transition: transform .3s;
        }
        .s-head { padding: 14px 12px; border-bottom: 1px solid #2a2b2d; }
        .new-btn {
            background: #131314; border: 1px solid #333; color: #e3e3e3;
            border-radius: 20px; padding: 8px 16px; cursor: pointer;
            font-size: 14px; display: flex; align-items: center; gap: 6px;
            font-family: inherit; transition: background .2s;
        }
        .new-btn:hover { background: #2a2b2d; }
        .s-label { font-size: 11px; color: #666; text-transform: uppercase;
            letter-spacing: .08em; padding: 12px 16px 4px; }
        #historyList { flex: 1; overflow-y: auto; padding: 4px 8px; }
        .h-item {
            width: 100%; text-align: left; background: none; border: none;
            color: #aaa; padding: 9px 10px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-family: inherit; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; display: block;
            transition: background .15s;
        }
        .h-item:hover { background: #2a2b2d; color: #e3e3e3; }
        .s-foot {
            padding: 14px 16px; border-top: 1px solid #2a2b2d;
            display: flex; align-items: center; gap: 10px;
        }
        .avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg,#4285f4,#9b72cb);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0;
        }
        /* Main */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; position: relative; }
        #header {
            height: 58px; background: #131314; border-bottom: 1px solid #2a2b2d;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px; flex-shrink: 0;
        }
        .logo { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .ico { display: flex; align-items: center; justify-content: center; }
        .ico-btn {
            background: none; border: none; cursor: pointer; color: #888;
            padding: 7px; border-radius: 50%; display: flex; align-items: center;
            transition: background .2s, color .2s;
        }
        .ico-btn:hover { background: #2a2b2d; color: #e3e3e3; }
        #chatArea {
            flex: 1; overflow-y: auto; padding: 24px 18px 170px;
            display: flex; flex-direction: column; gap: 18px;
        }
        /* Welcome */
        #welcome {
            display: flex; flex-direction: column;
            max-width: 680px; margin: 0 auto; width: 100%; padding-top: 36px;
        }
        .g-text {
            font-size: 34px; font-weight: 700; margin-bottom: 6px;
            background: linear-gradient(90deg,#4285f4,#9b72cb,#d96570);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle { font-size: 20px; color: #3a3b3d; margin-bottom: 32px; font-weight: 500; }
        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card {
            background: #1e1f20; border: 1px solid #2a2b2d; border-radius: 14px;
            padding: 16px; text-align: left; cursor: pointer; color: #ccc;
            font-size: 13.5px; font-family: inherit; min-height: 78px;
            transition: background .2s, border-color .2s; line-height: 1.5;
        }
        .card:hover { background: #252628; border-color: #444; }
        /* Messages */
        #msgs { display: none; flex-direction: column; gap: 18px; max-width: 680px; margin: 0 auto; width: 100%; }
        .u-row { display: flex; justify-content: flex-end; }
        .u-bub {
            background: #1e1f20; border: 1px solid #2a2b2d;
            border-radius: 18px 18px 4px 18px; padding: 12px 17px;
            max-width: 82%; font-size: 15px; line-height: 1.55; word-break: break-word;
        }
        .a-row { display: flex; gap: 11px; align-items: flex-start; }
        .a-ava {
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg,#4285f4,#d96570);
            display: flex; align-items: center; justify-content: center; font-size: 15px;
        }
        .a-bub { flex: 1; font-size: 15px; line-height: 1.7; color: #e3e3e3; overflow: hidden; }
        .a-bub p { margin: 0 0 10px; } .a-bub p:last-child { margin-bottom: 0; }
        .a-bub h1,.a-bub h2,.a-bub h3 { font-weight: 600; margin: 16px 0 6px; color: #fff; }
        .a-bub h1 { font-size: 19px; } .a-bub h2 { font-size: 16px; } .a-bub h3 { font-size: 14.5px; }
        .a-bub code { background: #2a2b2d; padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 13px; }
        .a-bub pre { background: #1e1f20; padding: 13px; border-radius: 8px; overflow-x: auto; border: 1px solid #2a2b2d; margin: 10px 0; }
        .a-bub pre code { background: transparent; padding: 0; color: #a8c7fa; }
        .a-bub ul,.a-bub ol { padding-left: 20px; margin: 6px 0 10px; }
        .a-bub ul { list-style: disc; } .a-bub ol { list-style: decimal; }
        .a-bub li { margin-bottom: 3px; } .a-bub strong { color: #fff; }
        /* Loader */
        #loading { display: none; gap: 11px; align-items: flex-start; max-width: 680px; margin: 0 auto; width: 100%; }
        .dots { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
        .dots span {
            width: 7px; height: 7px; background: #a8c7fa; border-radius: 50%;
            animation: bop 1.3s infinite ease-in-out;
        }
        .dots span:nth-child(1){animation-delay:-.3s} .dots span:nth-child(2){animation-delay:-.15s}
        @keyframes bop { 0%,80%,100%{transform:scale(.4);opacity:.4} 40%{transform:scale(1);opacity:1} }
        /* Input */
        #inputWrap {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 10px 18px 18px;
            background: linear-gradient(to top, #131314 75%, transparent);
        }
        .ibox {
            background: #1e1f20; border: 1px solid #2a2b2d; border-radius: 24px;
            display: flex; align-items: flex-end; gap: 6px; padding: 7px 10px;
            max-width: 680px; margin: 0 auto; transition: border-color .2s, background .2s;
        }
        .ibox:focus-within { border-color: #555; background: #242527; }
        #inp {
            flex: 1; background: transparent; border: none; outline: none;
            color: #e3e3e3; font-size: 15px; font-family: inherit;
            resize: none; max-height: 170px; overflow-y: auto; padding: 8px 0; line-height: 1.5;
        }
        #inp::placeholder { color: #4a4b4d; }
        .send-btn {
            background: none; border: none; cursor: pointer; color: #666;
            padding: 7px; border-radius: 50%; display: flex; align-items: center;
            transition: color .2s, background .2s; flex-shrink: 0;
        }
        .send-btn:hover { color: #a8c7fa; background: #2a2b2d; }
        .send-btn.active { color: #a8c7fa; }
        .foot-note { text-align: center; font-size: 11px; color: #444; margin-top: 7px; max-width: 680px; margin-left: auto; margin-right: auto; }
        /* Error */
        #errBox {
            position: absolute; top: -46px; left: 50%; transform: translateX(-50%);
            background: #7f1d1d; color: #fca5a5; padding: 7px 15px; border-radius: 8px;
            font-size: 13px; display: none; white-space: nowrap; border: 1px solid #991b1b;
        }
        /* Retry */
        .retry-btn {
            background: #1e1f20; border: 1px solid #333; color: #a8c7fa;
            padding: 7px 16px; border-radius: 8px; font-size: 13px;
            cursor: pointer; margin-top: 8px; font-family: inherit; transition: background .2s;
        }
        .retry-btn:hover { background: #2a2b2d; }
        /* Overlay & mobile */
        #ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 40; }
        #menuBtn { display: none; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3b3d; border-radius: 4px; }
        @media(max-width:600px){
            #sidebar { position: fixed; left: 0; top: 0; z-index: 50; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #ov.show { display: block; }
            #menuBtn { display: flex; }
        }
    </style>
</head>
<body>
<div id="ov" onclick="closeSidebar()"></div>

<aside id="sidebar">
    <div class="s-head">
        <button class="new-btn" onclick="newChat()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Chat
        </button>
    </div>
    <div class="s-label">Recent</div>
    <div id="historyList"></div>
    <div class="s-foot">
        <div class="avatar">S</div>
        <div>
            <div style="font-size:13px;font-weight:500">Student Portal</div>
            <div style="font-size:11px;color:#666">Grades 1–12</div>
        </div>
    </div>
</aside>

<div id="main">
    <div id="header">
        <div style="display:flex;align-items:center;gap:10px">
            <button class="ico-btn" id="menuBtn" onclick="openSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="logo">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a8c7fa" stroke-width="2" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                Study Ai
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
            <button class="ico-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <div style="width:30px;height:30px;border-radius:50%;background:#a8c7fa;display:flex;align-items:center;justify-content:center;color:#131314;font-weight:700;font-size:13px;cursor:pointer">U</div>
        </div>
    </div>

    <div id="chatArea">
        <div id="welcome">
            <div class="g-text">नमस्ते, विद्यार्थी।</div>
            <div class="subtitle">आज मैं आपकी पढ़ाई में कैसे मदद कर सकता हूँ?</div>
            <div class="cards">
                <button class="card" onclick="quickSend('कक्षा 5 के लिए जल चक्र (Water Cycle) को सरल शब्दों में समझाएं।')">🌊 जल चक्र को सरल शब्दों में समझाएं</button>
                <button class="card" onclick="quickSend('बीजगणित का यह समीकरण हल करें: 2x + 5 = 15')">📐 बीजगणित का समीकरण हल करें</button>
                <button class="card" onclick="quickSend('कंप्यूटर के इतिहास पर एक निबंध की रूपरेखा तैयार करें।')">💻 कंप्यूटर के इतिहास पर निबंध</button>
                <button class="card" onclick="quickSend('न्यूटन के गति के तीन नियम क्या हैं? उदाहरण के साथ समझाएं।')">🔭 न्यूटन के गति के तीन नियम</button>
            </div>
        </div>
        <div id="msgs"></div>
        <div id="loading">
            <div class="a-ava">🎓</div>
            <div class="a-bub"><div class="dots"><span></span><span></span><span></span></div></div>
        </div>
        <div id="anchor"></div>
    </div>

    <div id="inputWrap">
        <div id="errBox"></div>
        <div class="ibox">
            <button class="ico-btn" style="flex-shrink:0">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <textarea id="inp" rows="1" placeholder="Study Ai से कुछ भी पूछें (कक्षा 1 से 12 तक)..."
                oninput="grow(this)" onkeydown="onKey(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="send()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
        <div class="foot-note">Study Ai से गलतियां हो सकती हैं। कक्षा 1–12 के लिए। बनाया: <strong>Suhel &amp; Saurabh Sir</strong></div>
    </div>
</div>

<script>
const inp = document.getElementById('inp');
const welcome = document.getElementById('welcome');
const msgs = document.getElementById('msgs');
const loading = document.getElementById('loading');
const anchor = document.getElementById('anchor');
const historyList = document.getElementById('historyList');
const errBox = document.getElementById('errBox');
const sendBtn = document.getElementById('sendBtn');

let history = [];
try { history = JSON.parse(localStorage.getItem('sai_h')) || []; } catch(e){}
let sessionId = null;
let busy = false;
let lastQ = '';

function grow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 170) + 'px';
}

function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('ov').classList.add('show');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('ov').classList.remove('show');
}

function newChat() {
    sessionId = null;
    welcome.style.display = 'flex';
    msgs.style.display = 'none';
    msgs.innerHTML = '';
    loading.style.display = 'none';
    inp.value = ''; inp.style.height = 'auto';
    closeSidebar(); inp.focus();
}

function quickSend(t) { inp.value = t; grow(inp); send(); }
function onKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

function scroll() { anchor.scrollIntoView({behavior:'smooth'}); }

function showErr(msg, ms=5000) {
    errBox.textContent = msg;
    errBox.style.display = 'block';
    clearTimeout(errBox._t);
    errBox._t = setTimeout(() => errBox.style.display='none', ms);
}

function md(text) {
    try { return DOMPurify.sanitize(marked.parse(text)); }
    catch(e) { return text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
}

function addMsg(text, isUser) {
    const d = document.createElement('div');
    if (isUser) {
        d.className = 'u-row';
        d.innerHTML = `<div class="u-bub">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
    } else {
        d.className = 'a-row';
        d.innerHTML = `<div class="a-ava">🎓</div><div class="a-bub">${md(text)}</div>`;
    }
    msgs.appendChild(d);
    return d;
}

function saveHistory(q, a) {
    if (!sessionId) {
        sessionId = Date.now().toString();
        const title = q.length > 38 ? q.slice(0,38)+'…' : q;
        history.unshift({id: sessionId, title, messages:[]});
    }
    const s = history.find(x => x.id === sessionId);
    if (s) {
        s.messages.push({role:'user',content:q});
        s.messages.push({role:'ai',content:a});
        try { localStorage.setItem('sai_h', JSON.stringify(history)); } catch(e){}
        renderHistory();
    }
}

function loadSession(id) {
    const s = history.find(x => x.id === id);
    if (!s) return;
    sessionId = id;
    welcome.style.display = 'none';
    msgs.style.display = 'flex';
    msgs.innerHTML = '';
    s.messages.forEach(m => addMsg(m.content, m.role==='user'));
    scroll(); closeSidebar();
}

function renderHistory() {
    historyList.innerHTML = '';
    if (!history.length) {
        historyList.innerHTML = '<div style="font-size:12px;color:#555;padding:8px 10px;font-style:italic">No recent chats</div>';
        return;
    }
    history.slice(0,15).forEach(s => {
        const b = document.createElement('button');
        b.className = 'h-item'; b.textContent = s.title;
        b.onclick = () => loadSession(s.id);
        historyList.appendChild(b);
    });
}

// ✅ Anthropic API - works everywhere, no key needed in browser context
async function callAI(question) {
    const SYSTEM = `You are Study Ai, a helpful educational AI assistant for Indian students from Class 1 to Class 12. You were created by Suhel & Saurabh Sir.
Rules:
- Always respond in Hindi language only (Devanagari script)
- Use simple, clear language appropriate for school students
- Format your response with markdown (headings, bullet points, bold text)
- Be encouraging and supportive
- Keep answers educational and accurate`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1024,
            system: SYSTEM,
            messages: [{ role: 'user', content: question }]
        })
    });

    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || 'Status ' + res.status);
    }
    const data = await res.json();
    return data.content[0].text;
}

async function send() {
    if (busy) return;
    const q = inp.value.trim();
    if (!q) return;

    lastQ = q;
    busy = true;
    inp.value = ''; inp.style.height = 'auto';
    inp.disabled = true;
    sendBtn.classList.remove('active');

    welcome.style.display = 'none';
    msgs.style.display = 'flex';
    addMsg(q, true);
    loading.style.display = 'flex';
    scroll();

    if (!navigator.onLine) {
        done('❌ **Internet नहीं है।** कृपया internet connect करें।', q, true);
        return;
    }

    try {
        const answer = await callAI(q);
        done(answer, q, false);
    } catch(e) {
        console.error(e);
        done(`⚠️ **जवाब नहीं मिला।**\n\nError: ${e.message}`, q, true);
        showErr('कुछ गड़बड़ हुई, दोबारा कोशिश करें।');
    }
}

function done(answer, q, showRetry) {
    loading.style.display = 'none';
    addMsg(answer, false);
    if (showRetry) {
        const rb = document.createElement('button');
        rb.className = 'retry-btn'; rb.textContent = '🔄 दोबारा कोशिश करें';
        rb.onclick = () => { rb.remove(); inp.value = lastQ; send(); };
        msgs.appendChild(rb);
    }
    saveHistory(q, answer);
    busy = false; inp.disabled = false; inp.focus(); scroll();
}

renderHistory();
inp.addEventListener('input', () => {
    sendBtn.classList.toggle('active', inp.value.trim().length > 0);
});
window.addEventListener('offline', () => showErr('❌ Internet chala gaya!', 8000));
</script>
</body>
    </html>
